# File: .pre-commit-config.yaml
# Part of the sovereign-stack project.
# Version: See version.py
#
# ==============================================================================
# Sovereign Stack - Pre-Commit Hooks Configuration
# ==============================================================================
#
# DESCRIPTION:
# Automated integrity checks that run before each git commit to ensure
# code quality and prevent common issues from entering the repository.
#
# WHAT IT DOES:
# 1. Fixes trailing whitespace and ensures files end with newlines
# 2. Validates YAML and JSON syntax
# 3. Prevents large files from being committed
# 4. Formats Python code (Black) and removes unused imports
# 5. Lints Python (flake8) and Bash (ShellCheck) code
#
# INSTALLATION:
#    pip install pre-commit
#    pre-commit install
#
# USAGE:
#    pre-commit run --all-files  # Run all hooks
#    pre-commit run              # Run on staged files
#
