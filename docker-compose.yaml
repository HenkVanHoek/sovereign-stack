services:

  s3-mount-fixer:
    container_name: s3-mount-fixer
    image: alpine:latest
    volumes:
        - /mnt:/mnt:rshared
        - ${DOCKER_ROOT}/scripts:/scripts:ro
    environment:
        TZ: "${TZ}"
        CHECK_INTERVAL: "300"
    entrypoint: ["/bin/sh", "-c", "while true; do /scripts/fix-s3-permissions.sh; sleep $$CHECK_INTERVAL; done"]
    restart: always
    labels:
        - "com.centurylinklabs.watchtower.enable=false"

  infra-scanner:
    build:
      context: .
      dockerfile: Dockerfile.infra_scanner
    container_name: infra-scanner
    environment:
      TZ: "${TZ}"
    volumes:
      - ./inventory.json:/app/inventory.json:ro
      - ./credentials.json:/app/credentials.json:ro
      - ./.env:/app/.env:ro
    depends_on:
      - netbox
    networks:
      - pi-services

  # --- Portainer ---
  portainer:
    container_name: portainer
    image: portainer/portainer-ce:latest
    restart: unless-stopped
    environment:
      TZ: "${TZ}"
    security_opt:
      - "no-new-privileges:true"
    ports:
      - "${PORT_PORTAINER}:9443"
    volumes:
      - "/etc/localtime:/etc/localtime:ro"
      - "/var/run/docker.sock:/var/run/docker.sock"
      - "${DOCKER_ROOT}/portainer/data:/data"
    networks:
      - pi-services

  # --- Frigate ---
  frigate:
    container_name: frigate
    privileged: true
    restart: unless-stopped
    stop_grace_period: 30s
    image: ghcr.io/blakeblackshear/frigate:stable
    shm_size: "512mb"
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    devices:
      - "/dev/bus/usb:/dev/bus/usb"
      - "/dev/apex_0:/dev/apex_0"
      - "/dev/dri/renderD128:/dev/dri/renderD128"
      - "/dev/video10:/dev/video10"
      - "/dev/video11:/dev/video11"
      - "/dev/video12:/dev/video12"
      - "/dev/video13:/dev/video13"
    volumes:
      - "/etc/localtime:/etc/localtime:ro"
      - "${DOCKER_ROOT}/config:/config"
      - "${DOCKER_ROOT}/storage:/media/frigate"
      - type: bind
        source: /mnt/garage_s3/frigate/storage
        target: /media/frigate/s3_storage
        bind:
          propagation: rshared
      - type: tmpfs
        target: /tmp/cache
        tmpfs:
          size: 1000000000
    ports:
      - "${PORT_FRIGATE_WEB}:5000"
      - "${PORT_FRIGATE_WS}:8971"
      - "${PORT_FRIGATE_RTSP_RESTREAM}:8554"
      - "${PORT_FRIGATE_RTSP}:8555/tcp"
      - "${PORT_FRIGATE_RTSP}:8555/udp"
    environment:
      TZ: "${TZ}"
      FRIGATE_RTSP_PASSWORD: "${FRIGATE_RTSP_PASSWORD}"
      FRIGATE_MQTT_ENABLED: "True"
      FRIGATE_MQTT_HOST: "mqtt"
      FRIGATE_MQTT_PORT: "${FRIGATE_MQTT_PORT}"
      FRIGATE_MQTT_USER: "${FRIGATE_MQTT_USER}"
      FRIGATE_MQTT_PASSWORD: "${FRIGATE_MQTT_PASSWORD}"
    networks:
      - pi-services
    depends_on:
      - mqtt
      - s3-mount-fixer

  homeassistant:
    container_name: homeassistant
    image: "ghcr.io/home-assistant/home-assistant:stable"
    restart: unless-stopped
    privileged: true
    network_mode: host
    environment:
      TZ: "${TZ}"
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    volumes:
      - "${DOCKER_ROOT}/homeassistant:/config"
      - "/etc/localtime:/etc/localtime:ro"
    depends_on:
      - mqtt

  # --- MQTT ---
  mqtt:
    container_name: mqtt
    image: eclipse-mosquitto:latest
    restart: unless-stopped
    environment:
      TZ: "${TZ}"
    ports:
      - "${PORT_MQTT}:1883"
      - "${PORT_MQTT_WS}:9001"
    volumes:
      - "${DOCKER_ROOT}/mosquitto/config:/mosquitto/config"
      - "${DOCKER_ROOT}/mosquitto/data:/mosquitto/data"
      - "${DOCKER_ROOT}/mosquitto/log:/mosquitto/log"
    networks:
      - pi-services

  # --- AdGuard Home ---
  adguardhome:
    container_name: adguardhome
    image: adguard/adguardhome:latest
    restart: unless-stopped
    environment:
      TZ: "${TZ}"
    ports:
      - "${PORT_ADGUARD_DNS_TCP}:53/tcp"
      - "${PORT_ADGUARD_DNS_UDP}:53/udp"
      - "${PORT_ADGUARD_WEB}:3000/tcp"
      - "${PORT_ADGUARD_DNS_HTTP}:80/tcp"
    volumes:
      - "${DOCKER_ROOT}/adguardhome/work:/opt/adguardhome/work"
      - "${DOCKER_ROOT}/adguardhome/conf:/opt/adguardhome/conf"
      - "${DOCKER_ROOT}/npm/letsencrypt:/opt/adguardhome/conf/letsencrypt:ro"
    networks:
      - pi-services
    extra_hosts:
      - "${DOMAIN}:${INTERNAL_HOST_IP}"
      - "${EXTERNAL_DNS_NAME}:${EXTERNAL_DNS_IP}"

  vaultwarden:
    container_name: vaultwarden
    image: vaultwarden/server:latest
    restart: unless-stopped
    environment:
      TZ: "${TZ}"
      SIGNUPS_ALLOWED: "${SIGNUPS_ALLOWED}"
      WEBSOCKET_ENABLED: "true"
      DOMAIN: "https://vault.${DOMAIN}"
    volumes:
      - "${DOCKER_ROOT}/vaultwarden:/data"
    networks:
      - pi-services

  # --- Nginx Proxy Manager ---
  npm:
    container_name: npm
    image: jc21/nginx-proxy-manager:latest
    restart: unless-stopped
    environment:
      TZ: "${TZ}"
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    ports:
      - "${PORT_NPM_HTTP}:80/tcp"
      - "${PORT_NPM_HTTPS}:443/tcp"
      - "${PORT_NPM_ADMIN}:81/tcp"
    volumes:
      - "${DOCKER_ROOT}/npm/data:/data"
      - "${DOCKER_ROOT}/npm/letsencrypt:/etc/letsencrypt"
    networks:
      - pi-services

  # --- Step-CA (PKI) ---
  step-ca:
    image: "smallstep/step-ca"
    container_name: "step-ca"
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    networks:
      - "pi-services"
    ports:
      - "${PORT_STEP_CA}:9000"
    volumes:
      - "${DOCKER_ROOT}/step-ca:/home/step"
    environment:
      TZ: "${TZ}"
      DOCKER_STEPCA_INIT_NAME: "Sovereign CA"
      DOCKER_STEPCA_INIT_DNS_NAMES: "localhost,step-ca,${STEP_CA_DNS_IP}"
      DOCKER_STEPCA_INIT_PASSWORD: "${STEPCA_PASSWORD}"
      DOCKER_STEPCA_INIT_PROVISIONER_NAME: "${STEPCA_PROVISIONER_NAME}"
      DOCKER_STEPCA_INIT_PROVISIONER_PASSWORD: "${STEPCA_PROVISIONER_PASSWORD}"
    restart: "unless-stopped"

  fail2ban:
    image: crazymax/fail2ban:latest
    container_name: fail2ban
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - "${DOCKER_ROOT}/fail2ban/data:/data"
      - "${DOCKER_ROOT}/npm/data/logs:/var/log/npm:ro"
      - "${DOCKER_ROOT}/forgejo/data/gitea/log:/var/log/forgejo:ro"
    environment:
      TZ: "${TZ}"
      F2B_LOG_TARGET: "STDOUT"
      F2B_LOG_LEVEL: "INFO"
      F2B_DB_PURGE_AGE: "1d"
      SS_TPL_DESTMAIL: "${BACKUP_EMAIL}"
      SS_TPL_SENDERNAME: "Sovereign-Security"
      SS_TPL_SENDERMAIL: "${BACKUP_EMAIL}"
      SS_TPL_SMTPHOST: "${SMTP_HOST}"
      SS_TPL_SMTPPORT: "${SMTP_PORT}"
      SS_TPL_SMTPUSER: "${BACKUP_EMAIL}"
      SS_TPL_SMTPPASS: "${BACKUP_ENCRYPTION_KEY}"
      SS_TPL_SMTPTLS: "${SMTP_TLS}"

  glances:
    image: nicolargo/glances:latest
    container_name: glances
    restart: unless-stopped
    pid: host
    network_mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      TZ: "${TZ}"
      GLANCES_OPT: "-w"

  nextcloud-db:
    image: mariadb:10.11
    container_name: nextcloud-db
    restart: always
    command: >
      --transaction-isolation=READ-COMMITTED
      --log-bin=binlog
      --binlog-format=ROW
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    env_file: .env
    networks:
      - nextcloud-internal
    volumes:
      - "${DOCKER_ROOT}/nextcloud/db:/var/lib/mysql"
    environment:
      TZ: "${TZ}"
      MYSQL_ROOT_PASSWORD: "${NEXTCLOUD_DB_ROOT_PASSWORD}"
      MYSQL_PASSWORD: "${NEXTCLOUD_DB_PASSWORD}"
      MYSQL_DATABASE: "${NEXTCLOUD_DB_NAME}"
      MYSQL_USER: "${NEXTCLOUD_DB_USER}"

  nextcloud-redis:
    image: redis:alpine
    container_name: nextcloud-redis
    restart: always
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    environment:
      TZ: "${TZ}"
    networks:
      - nextcloud-internal

  # --- Nextcloud ---
  nextcloud-app:
    image: nextcloud:stable
    container_name: nextcloud-app
    restart: always
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    depends_on:
      - nextcloud-db
      - nextcloud-redis
    env_file: .env
    ports:
      - "${PORT_NEXTCLOUD}:80"
    networks:
      - pi-services
      - nextcloud-internal
    volumes:
      - "${DOCKER_ROOT}/nextcloud/data:/var/www/html"
    environment:
      TZ: "${TZ}"
      MYSQL_PASSWORD: "${NEXTCLOUD_DB_PASSWORD}"
      MYSQL_DATABASE: "${NEXTCLOUD_DB_NAME}"
      MYSQL_USER: "${NEXTCLOUD_DB_USER}"
      MYSQL_HOST: "nextcloud-db"
      REDIS_HOST: "nextcloud-redis"
      NEXTCLOUD_TRUSTED_DOMAINS: "${NEXTCLOUD_TRUSTED_DOMAINS}"
      MAIL_FROM_ADDRESS: "${NEXTCLOUD_MAIL_FROM_ADDRESS}"
      MAIL_DOMAIN: "${NEXTCLOUD_MAIL_DOMAIN}"
      SMTP_HOST: "${NEXTCLOUD_MAIL_SMTPHOST}"
      SMTP_PORT: "${NEXTCLOUD_MAIL_SMTPPORT}"
      SMTP_SECURE: "${NEXTCLOUD_MAIL_SMTPSECURE}"
      SMTP_AUTHTYPE: "LOGIN"
      SMTP_AUTH: "${NEXTCLOUD_MAIL_SMTPAUTH}"
      SMTP_NAME: "${NEXTCLOUD_MAIL_SMTPNAME}"
      SMTP_PASSWORD: "${NEXTCLOUD_MAIL_SMTPPASSWORD}"

  # --- Coturn (TURN Server) ---
  coturn:
    image: coturn/coturn:latest
    container_name: coturn
    restart: unless-stopped
    networks:
      - pi-services
    ports:
      - "${PORT_COTURN}:3478/tcp"
      - "${PORT_COTURN}:3478/udp"
    environment:
      TZ: "${TZ}"
      TURN_SECRET: "${COTUR_SECRET}"
      TURN_SERVER_NAME: "turn.${DOMAIN}"
      TURN_REALM: "turn.${DOMAIN}"
    command:
      - --log-file=stdout
      - --listening-port=3478
      - --min-port=${COTURN_MIN_PORT}
      - --max-port=${COTURN_MAX_PORT}
      - --user-quota=100
      - --total-quota=1000
      - --stale-nonce
      - --no-stdout-log

  notify-push:
    image: nextcloud:stable
    container_name: notify-push
    restart: unless-stopped
    depends_on:
      - nextcloud-app
      - nextcloud-db
      - nextcloud-redis
    environment:
      TZ: "${TZ}"
      PORT: "7867"
      NEXTCLOUD_URL: "https://nextcloud.${DOMAIN}"
    volumes:
      - "${DOCKER_ROOT}/nextcloud/data:/var/www/html"
    entrypoint: [ "/var/www/html/custom_apps/notify_push/bin/aarch64/notify_push" ]
    command: [ "/var/www/html/config/config.php" ]
    networks:
      - pi-services
      - nextcloud-internal

  # --- Homarr (Dashboard) ---
  homarr:
    container_name: homarr
    image: ghcr.io/ajnart/homarr:latest
    restart: unless-stopped
    volumes:
      - "${DOCKER_ROOT}/homarr/configs:/app/data/configs"
      - "${DOCKER_ROOT}/homarr/icons:/app/public/icons"
      - "/var/run/docker.sock:/var/run/docker.sock"
    ports:
      - "${PORT_HOMARR}:7575"
    environment:
      TZ: "${TZ}"
    networks:
      - pi-services

  forgejo-db:
    container_name: forgejo-db
    image: mariadb:10.11
    restart: always
    networks:
      - pi-services
    environment:
      TZ: "${TZ}"
      MYSQL_ROOT_PASSWORD: "${NEXTCLOUD_DB_ROOT_PASSWORD}"
      MYSQL_PASSWORD: "${FORGEJO_DB_PASSWORD}"
      MYSQL_DATABASE: "${FORGEJO_DB_NAME}"
      MYSQL_USER: "${FORGEJO_DB_USER}"
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    volumes:
      - "${DOCKER_ROOT}/forgejo/db:/var/lib/mysql"

  forgejo:
    container_name: forgejo
    image: codeberg.org/forgejo/forgejo:14
    restart: unless-stopped
    depends_on:
      - forgejo-db
    networks:
      - pi-services
    environment:
      TZ: "${TZ}"
      USER: "git"
      USER_UID: "1000"
      USER_GID: "1000"
      FORGEJO__database__DB_TYPE: "mysql"
      FORGEJO__database__HOST: "forgejo-db:3306"
      FORGEJO__database__NAME: "${FORGEJO_DB_NAME}"
      FORGEJO__database__USER: "${FORGEJO_DB_USER}"
      FORGEJO__database__PASSWD: "${FORGEJO_DB_PASSWORD}"
      FORGEJO__server__DOMAIN: "${DOMAIN}"
      FORGEJO__server__ROOT_URL: "https://git.${DOMAIN}"
      FORGEJO__SERVER__HTTP_PORT: "${FORGEJO__SERVER__HTTP_PORT}"
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    volumes:
      - "${DOCKER_ROOT}/forgejo/data:/data"
      - "/etc/localtime:/etc/localtime:ro"
    ports:
      - "${PORT_FORGEJO_SSH}:22"

  # --- Signal-CLI REST API ---
  signal-api:
    image: bbernhard/signal-cli-rest-api:latest
    container_name: signal-api
    environment:
      TZ: "${TZ}"
      MODE: "json-rpc"
      SIGNAL_CLI_API_PASSWORD: "${SIGNAL_CLI_API_PASSWORD}"
    ports:
      - "${PORT_SIGNAL_API}:8080"
    volumes:
      - "${DOCKER_ROOT}/signal-data:/home/.local/share/signal-cli"
    restart: unless-stopped

  # --- Lightweight Matrix Alternative (Optional) ---
  # Uncomment this block if you want to run a lightweight Matrix server (Conduit)
  # directly on the Raspberry Pi for small, private groups.
  # Note: For large communities (1000+ users), an external Synapse node is recommended.
  #
  # matrix:
  #   image: matrixconduit/matrix-conduit:latest
  #   container_name: matrix
  #   restart: unless-stopped
  #   environment:
  #     TZ: "${TZ}"
  #     CONDUIT_SERVER_NAME: "matrix.${DOMAIN}"
  #     CONDUIT_DATABASE_BACKEND: "rocksdb"
  #     CONDUIT_ALLOW_REGISTRATION: "false"
  #   volumes:
  #     - "${DOCKER_ROOT}/matrix:/var/lib/matrix-conduit"
  #   ports:
  #     - "6167:6167"
  #   networks:
  #     - pi-services

  # --- Matrix Synapse Server (Optional) ---
  # Uncomment this block to enable a full-featured Matrix server.
  # Requires: Generate SYNAPSE_SECRET_KEY and SYNAPSE_DB_PASSWORD in .env
  # First run: docker exec -it synapse register_new_matrix_user -c /data/homeserver.yaml http://localhost:8008
  #
  # synapse:
  #   image: matrixdotorg/synapse:latest
  #   container_name: synapse
  #   restart: unless-stopped
  #   environment:
  #     TZ: "${TZ}"
  #     SYNAPSE_SERVER_NAME: "matrix.${DOMAIN}"
  #     SYNAPSE_REPORT_STATS: "no"
  #   volumes:
  #     - "${DOCKER_ROOT}/synapse:/data"
  #   networks:
  #     - pi-services

  # --- Element Web UI (Optional) ---
  # Uncomment to enable the Element web client for Matrix.
  # Requires: synapse service to be running
  # Configure: Edit config.json to point to your Matrix server
  #
  # element:
  #   image: vectorim/element-web:latest
  #   container_name: element
  #   restart: unless-stopped
  #   environment:
  #     TZ: "${TZ}"
  #   volumes:
  #     - "${DOCKER_ROOT}/element:/usr/src/app/config.json:ro"
  #   networks:
  #     - pi-services

  # --- Pushmatrix (Optional) ---
  # REST API for sending Matrix messages from scripts/automation.
  # Requires: Synapse to be running and enabled.
  # Uncomment both Pushmatrix AND Synapse to use.
  #
  # pushmatrix:
  #   image: bonukai/pushmatrix:latest
  #   container_name: pushmatrix
  #   restart: unless-stopped
  #   environment:
  #     TZ: "${TZ}"
  #     PUSHMATRIX_HOMESERVER: "http://synapse:8008"
  #     PUSHMATRIX_USERNAME: "bot"
  #     PUSHMATRIX_PASSWORD: "${PUSHMATRIX_PASSWORD}"
  #   volumes:
  #     - "${DOCKER_ROOT}/pushmatrix:/data"
  #   networks:
  #     - pi-services

  netbox-db:
    container_name: netbox-db
    image: postgres:15-alpine
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    env_file: .env
    environment:
      TZ: "${TZ}"
      POSTGRES_DB: "${NETBOX_DB_NAME}"
      POSTGRES_USER: "${NETBOX_DB_USER}"
      POSTGRES_PASSWORD: "${NETBOX_DB_PASSWORD}"
    volumes:
      - "${DOCKER_ROOT}/netbox/db:/var/lib/postgresql/data"
    networks:
      - pi-services

  netbox-redis:
    container_name: netbox-redis
    image: redis:7-alpine
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    environment:
      TZ: "${TZ}"
    networks:
      - pi-services

  # --- NetBox (IPAM/DCIM) ---
  netbox:
    container_name: netbox
    image: netboxcommunity/netbox:latest
    restart: unless-stopped
    depends_on:
      - netbox-db
      - netbox-redis
    volumes:
      - "${DOCKER_ROOT}/netbox/media:/opt/netbox/netbox/media"
      - "${DOCKER_ROOT}/netbox/reports:/opt/netbox/netbox/reports"
      - "${DOCKER_ROOT}/netbox/scripts:/opt/netbox/netbox/scripts"
    ports:
      - "${PORT_NETBOX}:8080"
    environment:
      TZ: "${TZ}"
      API_TOKEN_PEPPERS: "${NETBOX_API_TOKEN_PEPPERS}"
      SECRET_KEY: "${NETBOX_SECRET_KEY}"
      DB_NAME: "${NETBOX_DB_NAME}"
      DB_USER: "${NETBOX_DB_USER}"
      DB_PASSWORD: "${NETBOX_DB_PASSWORD}"
      DB_HOST: "netbox-db"
      REDIS_HOST: "netbox-redis"
      ALLOWED_HOSTS: "${NETBOX_ALLOWED_HOSTS}"
    networks:
      - pi-services

  nmap-scanner:
    build:
      context: .
      dockerfile: Dockerfile.scanner
    container_name: nmap-scanner
    volumes:
      - .:/app
    network_mode: host
    cap_add:
      - NET_RAW
      - NET_ADMIN
    env_file: .env
    profiles: [ "tools" ]

  # --- UniFi Controller ---
  unifi-controller:
    container_name: unifi-controller
    image: lscr.io/linuxserver/unifi-network-application:latest
    restart: unless-stopped
    environment:
      TZ: "${TZ}"
      PUID: "1000"
      PGID: "1000"
      MONGO_USER: "unifi"
      MONGO_PASS: "${NETBOX_DB_PASSWORD}"
      MONGO_HOST: "unifi-db"
      MONGO_PORT: "${MONGO_PORT}"
      MONGO_DBNAME: "unifi"
    volumes:
      - "${DOCKER_ROOT}/unifi/config:/config"
    ports:
      - "${PORT_UNIFI_HTTPS}:8443"
      - "${PORT_UNIFI_STUN}:3478/udp"
      - "${PORT_UNIFI_API}:8080"
      - "${PORT_UNIFI_SSDP}:1900/udp"
      - "${PORT_UNIFI_GUEST_HTTPS}:8843"
      - "${PORT_UNIFI_GUEST_HTTP}:8880"
      - "${PORT_UNIFI_ADOPTION}:6789"
      - "${PORT_UNIFI_SYSLOG}:5514/udp"
    depends_on:
      - unifi-db
    networks:
      - pi-services

  unifi-db:
    container_name: unifi-db
    image: docker.io/mongo:7.0
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    environment:
      TZ: "${TZ}"
    volumes:
      - "${DOCKER_ROOT}/unifi/db:/data/db"
      - "${DOCKER_ROOT}/unifi/init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro"
    networks:
      - pi-services

  garage_daemon:
    image: dxflrs/garage:v0.9.1
    container_name: garage_daemon
    restart: always
    network_mode: host
    environment:
      TZ: "${TZ}"
      GARAGE_RPC_SECRET: "${GARAGE_RPC_SECRET}"
    volumes:
      - "${DOCKER_ROOT}/${GARAGE_ROOT}/garage.toml:/etc/garage.toml:ro"
      - "${DOCKER_ROOT}/${GARAGE_ROOT}/meta:/var/lib/garage/meta"
      - "${DOCKER_ROOT}/${GARAGE_ROOT}/data:/var/lib/garage/data"

  # --- Grafana + Loki + Alloy (Logging & Monitoring) ---

  loki:
    image: grafana/loki:3.2
    container_name: loki
    restart: unless-stopped
    environment:
      TZ: "${TZ}"
    ports:
      - "${PORT_LOKI}:3100"
    volumes:
      - "${DOCKER_ROOT}/loki:/loki"
      - "./loki-config.yaml:/etc/loki/local-config.yaml:ro"
    networks:
      - pi-services

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    environment:
      TZ: "${TZ}"
      GF_SECURITY_ADMIN_USER: "admin"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_PASSWORD}"
      GF_INSTALL_PLUGINS: "grafana-netbox-datasource"
    ports:
      - "${PORT_GRAFANA}:3000"
    volumes:
      - "${DOCKER_ROOT}/grafana:/var/lib/grafana"
    depends_on:
      - loki
    networks:
      - pi-services

  alloy:
    image: grafana/alloy:latest
    container_name: alloy
    restart: unless-stopped
    environment:
      TZ: "${TZ}"
    volumes:
      - "./alloy-config:/etc/alloy/config.alloy:ro"
      - "/var/run/docker.sock:/var/run/docker.sock"
    depends_on:
      - loki
    networks:
      - pi-services

networks:
  pi-services:
    name: pi-services
    driver: bridge
  nextcloud-internal:
    name: nextcloud-internal
    driver: bridge
    internal: true
