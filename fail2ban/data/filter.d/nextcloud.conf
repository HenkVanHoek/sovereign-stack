# Fail2ban Nextcloud filter
# File: nextcloud.conf
# Part of the sovereign-stack project.

[Definition]
# Match failed login attempts
failregex = ^<HOST> - .*Login failed:.*$
           ^<HOST> - .*Nextcloud.*password for.*$
           ^<HOST> - .*\"remoteAddr\".*\"message\".*\"Login failed\".*$
           ^<HOST> - .*User .* authentication failure.*$

# Ignore safe patterns (optional)
ignoreregex =
